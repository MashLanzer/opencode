<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenCode Clipper</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      background: #1a1a2e;
      color: #eee;
    }
    h3 {
      margin: 0 0 12px 0;
      color: #6366f1;
    }
    label {
      display: block;
      margin: 8px 0 4px;
      font-size: 12px;
      color: #aaa;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      background: #2a2a4a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      height: 80px;
      resize: none;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      background: #6366f1;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #818cf8;
    }
    button:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .tag {
      background: #2a2a4a;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .success {
      color: #22c55e;
      margin-top: 8px;
      text-align: center;
    }
    .error {
      color: #ef4444;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>📎 OpenCode Clipper</h3>
  
  <label> titulo</label>
  <input type="text" id="title" placeholder="Titulo de la pagina">
  
  <label>Nota</label>
  <textarea id="notes" placeholder="Tus notas..."></textarea>
  
  <label>Tags</label>
  <input type="text" id="tags" placeholder="web, articulo, proyecto">
  
  <button id="saveBtn" onclick="saveToObsidian()">Guardar en Obsidian</button>
  
  <div id="status"></div>
  
  <script>
    const OBSIDIAN_URL = 'http://127.0.0.1:27123';
    const API_KEY = 'dadde3d8184f6aae78239eb4570ac4430b55532fcf5afb77fd081f70c7e0c459';
    
    // Get current tab info
    chrome.tabs.query({active: true, currentWindow: true}, function(tabs) {
      if (tabs[0]) {
        document.getElementById('title').value = tabs[0].title.substring(0, 100);
      }
    });
    
    async function saveToObsidian() {
      const btn = document.getElementById('saveBtn');
      const status = document.getElementById('status');
      
      const title = document.getElementById('title').value;
      const notes = document.getElementById('notes').value;
      const tags = document.getElementById('tags').value;
      
      if (!title) {
        status.innerHTML = '<div class="error">Titulo requerido</div>';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Guardando...';
      
      const date = new Date().toISOString().split('T')[0];
      const content = `---
tags: [web-clip, ${tags || 'untagged'}]
creado: ${date}
source: web
---

# ${title}

## Notas
${notes}

## URL
{{url}}

---
*Guardado: ${date}*
`;
      
      try {
        const response = await fetch(`${OBSIDIAN_URL}/vault/Notas/lectura/${date}-${title.substring(0,30)}.md`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'text/markdown'
          },
          body: content
        });
        
        if (response.ok) {
          status.innerHTML = '<div class="success">Guardado en Obsidian!</div>';
          setTimeout(() => window.close(), 1500);
        } else {
          throw new Error('Failed to save');
        }
      } catch (error) {
        status.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
        btn.disabled = false;
        btn.textContent = 'Guardar en Obsidian';
      }
    }
  </script>
</body>
</html>
